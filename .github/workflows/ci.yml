name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache-dependency-glob: |
            pyproject.toml
            packages/*/pyproject.toml

      - name: Install dependency environment (no workspace packages)
        # Sync all third-party dependencies into the venv but skip
        # the workspace members themselves. We'll install those from
        # freshly-built wheels below, so tests run against the
        # distribution artefacts rather than the editable source
        # tree. This is what catches wheel-packaging bugs (e.g.
        # missing package-data declarations, omitted resource files).
        run: uv sync --all-extras --no-install-workspace

      - name: Run namespace-init guard
        run: bash scripts/check_no_namespace_init.sh

      - name: Run ruff
        run: uv run --no-project ruff check

      - name: Build all workspace wheels
        run: uv build --all-packages

      - name: Install wheels into the test environment
        # Force bash so the glob expands consistently across all
        # three runner OSes (default pwsh on Windows doesn't expand
        # dist/*.whl the same way).
        shell: bash
        run: uv pip install dist/*.whl

      - name: Run tests against installed wheels
        # --no-project stops uv re-syncing the environment (which
        # would reinstate editable installs) so pytest imports the
        # code from the installed wheels.
        run: uv run --no-project pytest -v

  docs:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.13"

      - name: Install workspace + docs dependencies
        run: uv sync --group docs

      - name: Build Sphinx docs
        run: uv run sphinx-build -b html docs docs/_build/html -W
