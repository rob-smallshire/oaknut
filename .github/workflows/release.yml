name: Release

# Publishes all packages to PyPI when a version tag is pushed.
#
#   v10.0.0  → build and publish every oaknut-* package + the meta-distribution
#
# All packages share a single version number. Authentication uses the
# account-scoped PYPI_TOKEN secret.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish ${{ github.ref_name }} to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.13"
          cache-dependency-glob: |
            pyproject.toml
            packages/*/pyproject.toml

      - name: Install workspace
        run: uv sync

      - name: Build all packages
        run: |
          rm -rf dist/
          # Build each workspace member.
          for pkg in oaknut-file oaknut-discimage oaknut-basic oaknut-dfs oaknut-adfs oaknut-afs oaknut-zip oaknut-disc; do
            uv build --package "$pkg" --out-dir dist/
          done
          # Build the meta-distribution.
          uv build --out-dir dist/
          echo "=== Built artefacts ==="
          ls -la dist/

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv publish dist/*
