name: Release

# Publishes a package to PyPI when a namespaced tag is pushed.
#
#   oaknut-v<x.y.z>          → publish the oaknut meta-distribution
#   oaknut-file-v<x.y.z>     → publish oaknut-file
#   oaknut-discimage-v<x.y.z>→ publish oaknut-discimage
#   oaknut-basic-v<x.y.z>    → publish oaknut-basic
#   oaknut-dfs-v<x.y.z>      → publish oaknut-dfs
#   oaknut-adfs-v<x.y.z>     → publish oaknut-adfs
#   oaknut-afs-v<x.y.z>      → publish oaknut-afs
#   oaknut-zip-v<x.y.z>      → publish oaknut-zip
#   oaknut-disc-v<x.y.z>     → publish oaknut-disc
#
# Each tag fires the workflow once; a determine-package step parses
# the tag and picks the right build command. Authentication uses the
# account-scoped PYPI_TOKEN secret, which has upload permissions for
# every current and future oaknut-* project.

on:
  push:
    tags:
      - 'oaknut-v*'
      - 'oaknut-file-v*'
      - 'oaknut-discimage-v*'
      - 'oaknut-basic-v*'
      - 'oaknut-dfs-v*'
      - 'oaknut-adfs-v*'
      - 'oaknut-afs-v*'
      - 'oaknut-zip-v*'
      - 'oaknut-disc-v*'

jobs:
  publish:
    name: Publish ${{ github.ref_name }} to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.13"
          cache-dependency-glob: |
            pyproject.toml
            packages/*/pyproject.toml

      - name: Determine package from tag
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          # Strip the version suffix to get the package name:
          # oaknut-disc-v1.0.0 → oaknut-disc
          pkg_name="${tag%-v*}"
          if [ "$pkg_name" = "oaknut" ]; then
            # Meta-distribution: build at workspace root.
            echo "package=oaknut" >> "$GITHUB_OUTPUT"
            echo "build_cmd=uv build" >> "$GITHUB_OUTPUT"
          else
            # Workspace member: build with --package.
            echo "package=$pkg_name" >> "$GITHUB_OUTPUT"
            echo "build_cmd=uv build --package $pkg_name" >> "$GITHUB_OUTPUT"
          fi
          echo "Determined package: $tag → $pkg_name"

      - name: Install workspace
        run: uv sync

      - name: Build ${{ steps.pkg.outputs.package }}
        run: |
          rm -rf dist/
          ${{ steps.pkg.outputs.build_cmd }}
          ls -la dist/

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv publish dist/*
