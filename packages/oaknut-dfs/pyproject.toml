[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "oaknut-dfs"
dynamic = ["version"]
authors = [{ name = "Robert Smallshire", email = "robert@smallshire.org.uk" }]
description = "Python library for handling Acorn DFS disc images (SSD/DSD format)"
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
requires-python = ">=3.11"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "oaknut-file>=10.0",
    "oaknut-discimage>=10.0",
    "oaknut-basic>=10.0",
    "typename>=1.0.4",
]

[project.urls]
Homepage = "https://github.com/rob-smallshire/oaknut"
Repository = "https://github.com/rob-smallshire/oaknut"
Issues = "https://github.com/rob-smallshire/oaknut/issues"

[tool.setuptools.dynamic]
version = { attr = "oaknut.dfs.__version__" }

[tool.setuptools.packages.find]
where = ["src"]
