[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "oaknut-discimage"
dynamic = ["version"]
authors = [{ name = "Robert Smallshire", email = "robert@smallshire.org.uk" }]
description = "Disc image sector abstractions shared by Acorn filesystem packages"
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
requires-python = ">=3.10"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: System :: Filesystems",
]
dependencies = [
    "oaknut-file>=10.0",
]

[project.urls]
Homepage = "https://github.com/rob-smallshire/oaknut"
Repository = "https://github.com/rob-smallshire/oaknut"
Issues = "https://github.com/rob-smallshire/oaknut/issues"

[dependency-groups]
test = [
    "pytest>=8.0",
]
dev = [
    "bump-my-version>=0.28.0",
    "pre-commit>=3.0",
    {include-group = "test"},
]

[tool.setuptools.dynamic]
version = { attr = "oaknut.discimage.__version__" }

[tool.setuptools.packages.find]
where = ["src"]
